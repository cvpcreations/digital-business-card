<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Business Card</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/6b7f6e4f2b.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="container">

    <!-- Profile -->
    <section id="profileSection" class="card">
        <img id="profileImage" src="" alt="" style="display:none;">

        <h1 id="name"></h1>

        <p id="designation"></p>

        <h2 id="company"></h2>

        <p id="tagline"></p>

    </section>


    <!-- Contact Buttons -->

    <section id="buttonsSection" class="card">

        <a id="callBtn" class="action-btn" style="display:none;">
            <i class="fa-solid fa-phone"></i>
            Call
        </a>

        <a id="whatsappBtn" class="action-btn" style="display:none;">
            <i class="fa-brands fa-whatsapp"></i>
            WhatsApp
        </a>

        <a id="emailBtn" class="action-btn" style="display:none;">
            <i class="fa-solid fa-envelope"></i>
            Email
        </a>

        <a id="websiteBtn" class="action-btn" style="display:none;">
            <i class="fa-solid fa-globe"></i>
            Website
        </a>

        <a id="directionBtn" class="action-btn" style="display:none;">
            <i class="fa-solid fa-location-dot"></i>
            Directions
        </a>

        <a id="saveBtn" class="action-btn" style="display:none;">
            <i class="fa-solid fa-address-card"></i>
            Save Contact
        </a>

        <a id="shareBtn" class="action-btn">
            <i class="fa-solid fa-share-nodes"></i>
            Share
        </a>

    </section>


    <!-- About -->

    <section id="aboutSection" class="card" style="display:none;">

        <h3>About</h3>

        <p id="about"></p>

    </section>



    <!-- Address -->

    <section id="addressSection" class="card" style="display:none;">

        <h3>Office Address</h3>

        <p id="address"></p>

    </section>



    <!-- Gallery -->

    <section id="gallerySection" class="card" style="display:none;">

        <h3>Gallery</h3>

        <div id="gallery"></div>

    </section>



    <!-- Social -->

    <section id="socialSection" class="card" style="display:none;">

        <h3>Connect</h3>

        <div id="socialLinks"></div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
