<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Business Card</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Free -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Profile -->
        <section id="profileSection" class="card">

            <img id="profileImage" src="" alt="Profile" style="display:none;">

            <h1 id="name"></h1>

            <p id="designation"></p>

            <h2 id="company"></h2>

            <p id="tagline"></p>

        </section>


        <!-- Contact Buttons -->

        <section id="buttonsSection" class="card">

            <a id="callBtn" class="action-btn" style="display:none;">
                <i class="fa-solid fa-phone"></i>
                <span>Call</span>
            </a>

            <a id="whatsappBtn" class="action-btn" style="display:none;">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>

            <a id="emailBtn" class="action-btn" style="display:none;">
                <i class="fa-solid fa-envelope"></i>
                <span>Email</span>
            </a>

            <a id="websiteBtn" class="action-btn" style="display:none;">
                <i class="fa-solid fa-globe"></i>
                <span>Website</span>
            </a>

            <a id="directionBtn" class="action-btn" style="display:none;">
                <i class="fa-solid fa-location-dot"></i>
                <span>Directions</span>
            </a>

            <a id="saveBtn" class="action-btn" style="display:none;">
                <i class="fa-solid fa-address-card"></i>
                <span>Save Contact</span>
            </a>

            <a id="shareBtn" class="action-btn">
                <i class="fa-solid fa-share-nodes"></i>
                <span>Share</span>
            </a>

        </section>


        <!-- About -->

        <section id="aboutSection" class="card" style="display:none;">

            <h3>About</h3>

            <p id="about"></p>

        </section>


        <!-- Address -->

        <section id="addressSection" class="card" style="display:none;">

            <h3>Office Address</h3>

            <p id="address"></p>

        </section>


        <!-- Gallery -->

        <section id="gallerySection" class="card" style="display:none;">

            <h3>Gallery</h3>

            <div id="gallery"></div>

        </section>


        <!-- Social -->

        <section id="socialSection" class="card" style="display:none;">

            <h3>Connect</h3>

            <div id="socialLinks"></div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
